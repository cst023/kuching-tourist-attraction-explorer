<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kuching Tourist Attraction Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>Kuching Attraction Explorer</h1>
  </div>

  <div class="controls">
    <input id="searchInput" type="text" placeholder="Search attractions..." />

    <div class="custom-select" id="categoryFilter">
      <button type="button" class="custom-select-trigger" id="categoryTrigger">
        <span id="categoryTriggerLabel">All categories</span>
        <span class="chevron">&#9662;</span>
      </button>
      <ul class="custom-select-options hidden" id="categoryOptions">
        <li data-value="" data-color="#2C6E7F" class="selected">All categories</li>
      </ul>
    </div>
  </div>
</header>

<div id="resultsBanner" class="results-banner">Search result: — locations found</div>

<main class="layout">
  <div id="map"></div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <aside id="detailPanel" class="detail-panel hidden">
    <button id="closePanel" class="close-btn" aria-label="Close">&times;</button><br>
    <img id="detailPhoto" src="" alt="" />
    <span id="detailCategory" class="detail-category"></span>
    <h2 id="detailName"></h2>
    <p id="detailDescription"></p>
  </aside>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
